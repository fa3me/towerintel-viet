<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TowerIntel Vietnam — Geospatial Intelligence Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@5.18.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0b1121;
            color: #fff;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .sidebar {
            width: 340px;
            background: rgba(17, 24, 39, 0.98);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow-y: auto;
        }

        .panel {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .map-container {
            flex: 1;
            position: relative;
            background: #000;
            cursor: crosshair;
        }

        #map,
        #map-right {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            pointer-events: none;
            z-index: 2;
        }

        #map-canvas,
        #map-canvas-right {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: auto;
            /* Ensure events reach deck.gl */
        }

        #map-canvas-right {
            z-index: 6;
            /* Slightly above left one, but both will be clipped */
            pointer-events: none;
            /* Only the top one (left) gets events by default, slider handles the rest */
        }

        /* Pitch Panel Styles */
        .pitch-panel {
            position: absolute;
            top: 20px;
            right: -400px;
            width: 380px;
            bottom: 20px;
            pointer-events: none; /* when hidden, don't block map clicks */
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 16px;
            z-index: 200;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        .pitch-panel.open {
            right: 20px;
            pointer-events: auto;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body>
    <div id="app" class="app">
        <aside class="sidebar">
            <div id="dashboard-panel" class="panel">
                <h2 style="color:#00e5ff; margin-bottom:5px;">TowerIntel Vietnam</h2>
                <p id="loading-text" style="font-size:10px; color:#94a3b8;">Loading Platform Intelligence...</p>
                <p id="population-attribution" style="font-size:9px; color:#64748b; line-height:1.35; margin-top:8px; max-width:300px;"></p>
            </div>
            <div id="filter-panel" class="panel"></div>
        </aside>

        <main class="map-container">
            <div id="map"></div>
            <!-- Second basemap for split compare (same geography as left strip; created in JS when compare opens) -->
            <div id="map-right" style="display: none;"></div>
            <canvas id="map-canvas"></canvas>
            <canvas id="map-canvas-right"></canvas>
            <!-- RF Legend -->
            <div id="rf-legend" class="rf-legend" style="display: none;">
                <h4>RSRP (dBm)</h4>
                <div class="legend-item"><span class="color-box" style="background:#cc0000;"></span> Excellent (&gt;
                    -65)</div>
                <div class="legend-item"><span class="color-box" style="background:#ff9933;"></span> Very Good (-65 to
                    -75)</div>
                <div class="legend-item"><span class="color-box" style="background:#ffff00;"></span> Good (-75 to -85)
                </div>
                <div class="legend-item"><span class="color-box" style="background:#00cc66;"></span> Fair (-85 to -95)
                </div>
                <div class="legend-item"><span class="color-box" style="background:#0066cc;"></span> Poor (-95 to -105)
                </div>
            </div>
            <!-- Map controls: Zoom | Measure | Pegman | 3D | Satellite (reduce left-side clutter) -->
            <div
                style="position: absolute; bottom: 30px; left: 20px; z-index: 50; display: flex; gap: 8px; align-items: center;">
                <!-- Custom Zoom Controls -->
                <div
                    style="display: flex; background: rgba(17, 24, 39, 0.9); border: 1px solid #334155; border-radius: 8px; overflow: hidden; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);">
                    <button id="deck-zoom-in"
                        style="background: transparent; border: none; color: #fff; padding: 6px 12px; font-weight: bold; font-size: 16px; cursor: pointer; border-right: 1px solid #334155; transition: background 0.2s;"
                        onmouseover="this.style.background='rgba(0, 229, 255, 0.1)'"
                        onmouseout="this.style.background='transparent'">+</button>
                    <button id="deck-zoom-out"
                        style="background: transparent; border: none; color: #fff; padding: 6px 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s;"
                        onmouseover="this.style.background='rgba(0, 229, 255, 0.1)'"
                        onmouseout="this.style.background='transparent'">−</button>
                </div>
                <button id="map-measure-btn" class="toggle-3d-btn" style="position: static; padding: 6px 12px; font-size: 13px;" title="Click two points on the map to measure distance">📐 Measure</button>
                <button id="map-compare-area-btn" class="toggle-3d-btn" style="position: static; padding: 6px 12px; font-size: 13px;" title="Draw a polygon to compare two MNOs (RSRP, sites, share) inside that area">⬡ Area compare</button>
                <button id="street-view-btn" class="toggle-3d-btn"
                    style="position: static; padding: 6px 12px; font-size: 13px;" title="Drop Pegman for Street View">🚶 Pegman</button>
                <button id="toggle-3d" class="toggle-3d-btn" style="position: static;" title="Toggle 3D Terrain View">🌍 3D</button>
                <button id="map-satellite-btn" class="toggle-3d-btn" style="position: static; padding: 6px 12px; font-size: 13px;" title="Toggle satellite imagery">🛰️ Satellite</button>

                <!-- Cursor Coordinates -->
                <div id="cursor-coords"
                    style="background: rgba(17, 24, 39, 0.9); border: 1px solid #334155; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; font-family: monospace; color: #00e5ff; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.4); min-width: 140px; text-align: center;">
                    Lat: --.----, Lng: --.----
                </div>

                <!-- Terrain Controls (visible in 3D mode) -->
                <div id="terrain-controls"
                    style="display: none; align-items: center; gap: 10px; background: rgba(17, 24, 39, 0.9); border: 1px solid #334155; padding: 8px 14px; border-radius: 10px; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.4);">
                    <label style="font-size: 11px; color: #94a3b8; font-weight: 600;">Terrain: <span id="exag-val"
                            style="color: #00e5ff;">1.5x</span></label>
                    <input type="range" id="terrain-exag" min="1" max="5" step="0.5" value="1.5"
                        style="width: 100px; accent-color: #00e5ff; cursor: pointer;">
                </div>
            </div>

            <!-- Floating Street View Container -->

            <div id="sv-container"
                style="display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 600px; height: 400px; background: #000; border: 2px solid #00e5ff; border-radius: 12px; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); overflow: hidden;">
                <div
                    style="background: rgba(17,24,39,0.9); padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; height: 35px;">
                    <span style="font-size: 13px; font-weight: 600; color: #00e5ff;">🚶 Google Street View</span>
                    <button id="close-sv"
                        style="background: transparent; border: none; color: #fff; font-size: 18px; cursor: pointer; padding: 0 8px; line-height: 1;">&times;</button>
                </div>
                <iframe id="sv-iframe" style="width: 100%; height: calc(100% - 35px); border: 0; display: block;"
                    allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <!-- North indicator / compass (click to reset bearing) -->
            <div id="compass"
                style="position: absolute; top: 18px; left: 50%; transform: translateX(-50%); z-index: 60; display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 10px; background: rgba(17,24,39,0.85); border: 1px solid #334155; backdrop-filter: blur(10px); cursor: pointer; user-select: none;">
                <div id="compass-arrow" style="width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 14px solid #00e5ff; transform: rotate(0deg); transition: transform 0.12s linear;"></div>
                <div style="font-size: 11px; font-weight: 700; color: #00e5ff;">N</div>
                <div id="compass-deg" style="font-size: 10px; color: #94a3b8; min-width: 44px; text-align: right;">0°</div>
            </div>

            <!-- Polygon compare: population / sites / KPI strip (below compass when area is drawn) -->
            <div id="polygon-area-summary" class="polygon-area-summary" style="display: none;" aria-live="polite"></div>

            <!-- Network Intel Panel (floating, shown when layer toggled) -->
            <div id="network-intel-panel" class="network-intel-panel"></div>
            <div id="polygon-compare-root"></div>

            <!-- Geohash Tooltip (dynamically positioned) -->
            <div id="geohash-tooltip" class="geohash-tooltip"></div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
